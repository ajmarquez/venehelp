        <p class="eyebrow">Beta registry</p>
        <h1>Unified registry (beta)</h1>
        <p class="page-intro">Beta provenance table with search and status filters. The data is still partial and depends on public per-site adapters.</p>

        <section class="page-card">
          <p class="small" data-registry-meta>Loading beta registry</p>
          <div class="registry-stats" data-registry-stats></div>
          <div class="controls">
            <div class="field">
              <label for="registry-search">Search the registry</label>
              <input
                id="registry-search"
                type="search"
                placeholder="Name, location, or source"
                data-registry-search
              >
            </div>
            <div class="field">
              <label for="registry-status">Status</label>
              <select id="registry-status" data-registry-status>
                <option value="all">All statuses</option>
                <option value="missing">Missing</option>
                <option value="safe">Safe</option>
                <option value="found">Found</option>
              </select>
            </div>
            <div class="field">
              <label>Visible rows</label>
              <p class="small" data-registry-results>Loading beta registry</p>
            </div>
          </div>
          <div class="table-scroll">
            <table class="registry-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Status</th>
                  <th>Location</th>
                  <th>Reported on</th>
                </tr>
              </thead>
              <tbody data-registry-body>
                <tr><td colspan="4" class="small">Loading beta registry</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
