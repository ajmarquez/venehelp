name: Refresh Registry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh beta registry
        env:
          VENEZUELA_REPORTA_MAX_PAGES: 5
          VENEZUELA_REPORTA_CONCURRENCY: 4
        run: npm run refresh-registry

      - name: Rebuild static site
        run: npm run build

      - name: Commit changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registry.json docs scripts/build.mjs package.json .github/workflows/refresh-registry.yml
          git commit -m "Refresh registry preview"
          git push
